version: "1.0"
database:
  app_schema: "mock_app"
  engine_schema: "dpdp_engine"

compliance_policy:
  default_retention_years: 1
  notice_window_hours: 48
  retention_rules:
    - rule_name: "PMLA_FINANCIAL"
      legal_citation: "Prevention of Money Laundering Act, 2002, Sec 12"
      if_has_data_in: ["transactions", "invoices"]
      retention_years: 10
    - rule_name: "RBI_KYC"
      legal_citation: "RBI KYC Directions, 2016, Sec 38"
      if_has_data_in: ["kyc_documents"]
      retention_years: 5

graph:
  root_table: "users"
  root_id_column: "id"
  max_depth: 32
  notice_email_column: "email"
  notice_name_column: "full_name"
  root_pii_columns:
    email: "HMAC"
    full_name: "STATIC_MASK"

rules:
  - id: "mega_static_dag"
    root_table: "mock_app.users"
    max_depth: 32
    targets:
      - table: "mock_app.users"
        primary_key_columns: ["id"]
        pii_columns: []
      - table: "mock_app.profiles"
        parent: "mock_app.users"
        parent_columns: ["id"]
        child_columns: ["user_id"]
        primary_key_columns: ["id"]
        action: "redact"
        pii_columns: ["bio", "address"]
        mutation_rules:
          bio: "STATIC_MASK"
          address: "HMAC"
      - table: "mock_app.profile_devices"
        parent: "mock_app.profiles"
        parent_columns: ["id"]
        child_columns: ["profile_id"]
        primary_key_columns: ["id"]
        action: "redact"
        pii_columns: ["device_fingerprint", "ip_address"]
        mutation_rules:
          device_fingerprint: "HMAC"
          ip_address: "HMAC"
      - table: "mock_app.support_tickets"
        parent: "mock_app.users"
        parent_columns: ["id"]
        child_columns: ["requester_id"]
        primary_key_columns: ["id"]
        action: "redact"
        pii_columns: ["subject", "body"]
        mutation_rules:
          subject: "STATIC_MASK"
          body: "HMAC"
      - table: "mock_app.support_comments"
        parent: "mock_app.support_tickets"
        parent_columns: ["id"]
        child_columns: ["ticket_id"]
        primary_key_columns: ["id"]
        action: "redact"
        pii_columns: ["body"]
        mutation_rules:
          body: "NULLIFY"
      - table: "mock_app.payment_methods"
        parent: "mock_app.users"
        parent_columns: ["id"]
        child_columns: ["user_id"]
        primary_key_columns: ["id"]
        action: "redact"
        pii_columns: ["pan_token", "billing_name"]
        mutation_rules:
          pan_token: "HMAC"
          billing_name: "STATIC_MASK"
      - table: "mock_app.pii_probe_documents"
        parent: "mock_app.users"
        parent_columns: ["id"]
        child_columns: ["user_id"]
        primary_key_columns: ["id"]
        action: "redact"
        pii_columns: ["aadhaar_number", "pan_number", "credit_card_number", "upi_id", "indian_mobile", "passport_number", "ip_address", "nested_payload"]
        mutation_rules:
          aadhaar_number: "HMAC"
          pan_number: "HMAC"
          credit_card_number: "HMAC"
          upi_id: "HMAC"
          indian_mobile: "HMAC"
          passport_number: "HMAC"
          ip_address: "HMAC"
          nested_payload: "NULLIFY"
      - table: "mock_app.account_hierarchy"
        parent: "mock_app.users"
        parent_columns: ["id"]
        child_columns: ["user_id"]
        primary_key_columns: ["id"]
        action: "redact"
        pii_columns: ["note"]
        mutation_rules:
          note: "STATIC_MASK"
      - table: "mock_app.marketing_leads"
        parent: "mock_app.users"
        parent_columns: ["email"]
        child_columns: ["email"]
        primary_key_columns: ["id"]
        action: "redact"
        pii_columns: ["email", "name"]
        mutation_rules:
          email: "HMAC"
          name: "STATIC_MASK"
      - table: "mock_app.system_audit_logs"
        parent: "mock_app.users"
        parent_columns: ["user_identifier"]
        child_columns: ["user_identifier"]
        primary_key_columns: ["id"]
        action: "hard_delete"
        pii_columns: []
      - table: "mock_app.login_events"
        parent: "mock_app.users"
        parent_columns: ["user_identifier"]
        child_columns: ["user_identifier"]
        primary_key_columns: ["id"]
        action: "hard_delete"
        pii_columns: []
      - table: "mock_app.notification_tokens"
        parent: "mock_app.users"
        parent_columns: ["user_identifier"]
        child_columns: ["user_identifier"]
        primary_key_columns: ["id"]
        action: "hard_delete"
        pii_columns: []
      - table: "mock_app.transactions"
        parent: "mock_app.users"
        parent_columns: ["id"]
        child_columns: ["id"]
        primary_key_columns: ["id"]
        pii_columns: []
      - table: "mock_app.invoices"
        parent: "mock_app.users"
        parent_columns: ["id"]
        child_columns: ["id"]
        primary_key_columns: ["id"]
        pii_columns: []
      - table: "mock_app.kyc_documents"
        parent: "mock_app.users"
        parent_columns: ["id"]
        child_columns: ["id"]
        primary_key_columns: ["id"]
        pii_columns: []
      - table: "mock_app.bulk_analytics_events"
        parent: "mock_app.users"
        parent_columns: ["user_identifier"]
        child_columns: ["user_identifier"]
        primary_key_columns: ["id"]
        pii_columns: []
      - table: "mock_app.logical_user_notes"
        parent: "mock_app.users"
        parent_columns: ["id"]
        child_columns: ["user_id"]
        primary_key_columns: ["id"]
        action: "redact"
        pii_columns: ["recovery_email", "freeform_phone", "note"]
        mutation_rules:
          recovery_email: "HMAC"
          freeform_phone: "HMAC"
          note: "STATIC_MASK"

satellite_targets:
  - table: "marketing_leads"
    lookup_column: "email"
    action: "redact"
    masking_rules:
      email: "HMAC"
      name: "STATIC_MASK"
  - table: "system_audit_logs"
    lookup_column: "user_identifier"
    action: "hard_delete"
  - table: "login_events"
    lookup_column: "user_identifier"
    action: "hard_delete"
  - table: "notification_tokens"
    lookup_column: "user_identifier"
    action: "hard_delete"

blob_targets: []

purge_policy:
  enabled: true
  selector:
    kind: "boolean_column"
    column: "purge_eligible"
    value: true
  max_batch_size: 10000
  actor_opaque_id: "dpo_mega_purge"
  legal_framework: "DPDP_2023"
  legal_citation: "DPDP Act, 2023 Sec 12 read with configured client retention schedule"

outbox:
  batch_size: 25
  lease_seconds: 60
  max_attempts: 10
  base_backoff_ms: 250

security:
  notification_lease_seconds: 120
  master_key_env: "DPDP_MASTER_KEY"
  hmac_key_env: "DPDP_HMAC_KEY"

integrity:
  expected_schema_hash: "fca9f1ef81ad9518d4335395035f13b76315055834316b0ee6484beb23996eea"

legal_attestation:
  dpo_identifier: "mega-e2e-dpo@example.com"
  configuration_version: "mega-e2e-v1"
  legal_review_date: "2026-05-09"
